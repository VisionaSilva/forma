<!-- Block: avatar-row | Variants: contributors, social-proof, team-compact -->
<section class="section avatar-row-block">
  <div class="avatar-row-inner" data-animate="fade-up">
    <div class="avatar-row-social">
      <div class="avatar-row-faces">
        <div class="avatar-row-face" style="background: var(--accent-primary)">C</div>
        <div class="avatar-row-face" style="background: var(--text-secondary)">R</div>
        <div class="avatar-row-face" style="background: var(--accent-secondary)">V</div>
        <div class="avatar-row-face avatar-row-face--count">+12</div>
      </div>
      <div class="avatar-row-meta">
        <p class="avatar-row-text"><strong>15 contributors</strong> have built with Forma this week.</p>
        <div class="avatar-row-stars">
          <span class="avatar-row-star">★</span><span class="avatar-row-star">★</span><span class="avatar-row-star">★</span><span class="avatar-row-star">★</span><span class="avatar-row-star">★</span>
          <span class="avatar-row-rating">4.9 / 5.0</span>
        </div>
      </div>
    </div>
  </div>
</section>
