<!-- Block: case-study | Before/after with metrics and narrative -->
<section class="section case-study-block">
<div class="case-study-inner" data-animate="fade-up">
    <div class="case-study-header">
      <div class="case-study-eyebrow">Results</div>
      <h2 class="case-study-title">Real outcomes</h2>
    </div>

    <div class="case-study-card">
      <div class="case-study-meta">
        <div class="case-study-company">Company Name</div>
        <div class="case-study-industry">Industry</div>
      </div>

      <div class="case-study-metrics">
        <div class="case-study-metric">
          <div class="case-study-metric-number">3x</div>
          <div class="case-study-metric-label">Faster builds</div>
        </div>
        <div class="case-study-metric">
          <div class="case-study-metric-number">0</div>
          <div class="case-study-metric-label">CSS bugs shipped</div>
        </div>
        <div class="case-study-metric">
          <div class="case-study-metric-number">100%</div>
          <div class="case-study-metric-label">Validator pass rate</div>
        </div>
      </div>

      <div class="case-study-quote">
        <blockquote>"Quote from the customer about their experience and results."</blockquote>
        <div class="case-study-attribution">
          <span class="case-study-name">Person Name</span>
          <span class="case-study-role">Role, Company</span>
        </div>
      </div>

      <div class="case-study-before-after">
        <div class="case-study-before">
          <div class="case-study-ba-label">Before</div>
          <p class="case-study-ba-text">Description of the situation before.</p>
        </div>
        <div class="case-study-after">
          <div class="case-study-ba-label">After</div>
          <p class="case-study-ba-text">Description of the results after.</p>
        </div>
      </div>
    </div>
  </div>
</section>
