<!-- Block: comparison | Side-by-side or table comparison -->
<section class="section comparison-block">
<div class="comparison-inner" data-animate="fade-up">
    <div class="comparison-header">
      <div class="comparison-eyebrow">Compare</div>
      <h2 class="comparison-title">Why choose us</h2>
    </div>

    <div class="comparison-table">
      <div class="comparison-row comparison-row--header">
        <div class="comparison-cell comparison-cell--feature">Feature</div>
        <div class="comparison-cell comparison-cell--us">Us</div>
        <div class="comparison-cell comparison-cell--them">Them</div>
        <div class="comparison-cell comparison-cell--diy">DIY</div>
      </div>
      <div class="comparison-row">
        <div class="comparison-cell comparison-cell--feature">Feature 1</div>
        <div class="comparison-cell comparison-cell--us"><span class="check">✓</span></div>
        <div class="comparison-cell comparison-cell--them"><span class="cross">✗</span></div>
        <div class="comparison-cell comparison-cell--diy"><span class="cross">✗</span></div>
      </div>
      <div class="comparison-row">
        <div class="comparison-cell comparison-cell--feature">Feature 2</div>
        <div class="comparison-cell comparison-cell--us"><span class="check">✓</span></div>
        <div class="comparison-cell comparison-cell--them"><span class="check">✓</span></div>
        <div class="comparison-cell comparison-cell--diy"><span class="cross">✗</span></div>
      </div>
      <div class="comparison-row">
        <div class="comparison-cell comparison-cell--feature">Feature 3</div>
        <div class="comparison-cell comparison-cell--us"><span class="check">✓</span></div>
        <div class="comparison-cell comparison-cell--them"><span class="cross">✗</span></div>
        <div class="comparison-cell comparison-cell--diy"><span class="partial">~</span></div>
      </div>
      <div class="comparison-row">
        <div class="comparison-cell comparison-cell--feature">Feature 4</div>
        <div class="comparison-cell comparison-cell--us"><span class="check">✓</span></div>
        <div class="comparison-cell comparison-cell--them"><span class="cross">✗</span></div>
        <div class="comparison-cell comparison-cell--diy"><span class="cross">✗</span></div>
      </div>
      <div class="comparison-row">
        <div class="comparison-cell comparison-cell--feature">Feature 5</div>
        <div class="comparison-cell comparison-cell--us"><span class="check">✓</span></div>
        <div class="comparison-cell comparison-cell--them"><span class="partial">~</span></div>
        <div class="comparison-cell comparison-cell--diy"><span class="cross">✗</span></div>
      </div>
    </div>
  </div>
</section>
