<!-- Block: kpi-grid | Variants: default, with-chart, minimal -->
<section class="section kpi-grid-block">
  <div class="kpi-grid-inner" data-animate="fade-up">
    <h2 class="kpi-grid-title">By the numbers</h2>
    <div class="kpi-grid-items">
      <div class="kpi-grid-item">
        <span class="kpi-grid-value">98%</span>
        <span class="kpi-grid-label">Collection rate</span>
        <span class="kpi-grid-trend kpi-grid-trend--up">↑ 2% this month</span>
      </div>
      <div class="kpi-grid-item">
        <span class="kpi-grid-value">204</span>
        <span class="kpi-grid-label">Tasks on-chain</span>
        <span class="kpi-grid-trend kpi-grid-trend--up">↑ 17 this week</span>
      </div>
      <div class="kpi-grid-item">
        <span class="kpi-grid-value">32</span>
        <span class="kpi-grid-label">Blocks in library</span>
        <span class="kpi-grid-trend kpi-grid-trend--neutral">→ Expanding</span>
      </div>
      <div class="kpi-grid-item">
        <span class="kpi-grid-value">0</span>
        <span class="kpi-grid-label">Compile errors</span>
        <span class="kpi-grid-trend kpi-grid-trend--up">✓ 3 AIs tested</span>
      </div>
    </div>
  </div>
</section>
