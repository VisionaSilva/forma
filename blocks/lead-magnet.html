<!-- Block: lead-magnet | Email capture with offer -->
<section class="section lead-magnet-block">
<div class="lead-magnet-inner" data-animate="fade-up">
    <div class="lead-magnet-content">
      <div class="lead-magnet-eyebrow">Free Resource</div>
      <h2 class="lead-magnet-title">Get the guide</h2>
      <p class="lead-magnet-subtitle">A short pitch about what they'll receive and why it's valuable.</p>
    </div>
    <div class="lead-magnet-form">
      <div class="lead-magnet-input-group">
        <input type="email" class="lead-magnet-input" placeholder="your@email.com" aria-label="Email address">
        <button class="lead-magnet-submit" type="button">Get It Free</button>
      </div>
      <div class="lead-magnet-fine-print">No spam. Unsubscribe anytime.</div>
    </div>
  </div>
</section>
