<!-- Block: problem-solution | Pain vs resolution side by side -->
<section class="section problem-solution-block">
<div class="problem-solution-inner" data-animate="fade-up">
    <div class="problem-solution-header">
      <div class="problem-solution-eyebrow">The Problem</div>
      <h2 class="problem-solution-title">What you're dealing with</h2>
    </div>

    <div class="ps-grid">
      <div class="ps-panel ps-panel--problem">
        <div class="ps-panel-label">Without us</div>
        <ul class="ps-list">
          <li class="ps-item ps-item--bad">
            <span class="ps-marker">✗</span>
            <span class="ps-text">Problem point 1</span>
          </li>
          <li class="ps-item ps-item--bad">
            <span class="ps-marker">✗</span>
            <span class="ps-text">Problem point 2</span>
          </li>
          <li class="ps-item ps-item--bad">
            <span class="ps-marker">✗</span>
            <span class="ps-text">Problem point 3</span>
          </li>
          <li class="ps-item ps-item--bad">
            <span class="ps-marker">✗</span>
            <span class="ps-text">Problem point 4</span>
          </li>
        </ul>
      </div>

      <div class="ps-divider" aria-hidden="true">
        <div class="ps-divider-arrow">→</div>
      </div>

      <div class="ps-panel ps-panel--solution">
        <div class="ps-panel-label">With us</div>
        <ul class="ps-list">
          <li class="ps-item ps-item--good">
            <span class="ps-marker">✓</span>
            <span class="ps-text">Solution point 1</span>
          </li>
          <li class="ps-item ps-item--good">
            <span class="ps-marker">✓</span>
            <span class="ps-text">Solution point 2</span>
          </li>
          <li class="ps-item ps-item--good">
            <span class="ps-marker">✓</span>
            <span class="ps-text">Solution point 3</span>
          </li>
          <li class="ps-item ps-item--good">
            <span class="ps-marker">✓</span>
            <span class="ps-text">Solution point 4</span>
          </li>
        </ul>
      </div>
    </div>
  </div>
</section>
