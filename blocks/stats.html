<!-- Block: stats | Variants: default (3-4 large stat numbers with labels) -->
<section class="section stats-block">
<div class="stats-inner" data-animate="fade-up">
    <div class="stats-header">
      <p class="stats-title">Trusted by builders worldwide</p>
    </div>

    <div class="stats-grid" role="list" aria-label="Key statistics">
      <div class="stat-item" role="listitem">
        <div class="stat-number">50<span class="stat-suffix">+</span></div>
        <div class="stat-label">Production-ready blocks</div>
      </div>

      <div class="stat-item" role="listitem">
        <div class="stat-number">12<span class="stat-suffix">k</span></div>
        <div class="stat-label">Developers using Forma</div>
      </div>

      <div class="stat-item" role="listitem">
        <div class="stat-number">98<span class="stat-suffix">%</span></div>
        <div class="stat-label">Lighthouse accessibility score</div>
      </div>

      <div class="stat-item" role="listitem">
        <div class="stat-number">4<span class="stat-suffix">x</span></div>
        <div class="stat-label">Faster page builds on average</div>
      </div>
    </div>
  </div>
</section>
