<!-- Block: system-diagram | Architecture/flow visualization -->
<section class="section system-diagram-block">
<div class="system-diagram-inner" data-animate="fade-up">
    <div class="system-diagram-header">
      <div class="system-diagram-eyebrow">Architecture</div>
      <h2 class="system-diagram-title">How the system connects</h2>
    </div>

    <div class="diagram-flow">
      <div class="diagram-node diagram-node--input">
        <div class="diagram-node-icon">→</div>
        <div class="diagram-node-label">Input</div>
        <div class="diagram-node-desc">Where it starts</div>
      </div>

      <div class="diagram-connector" aria-hidden="true">
        <div class="diagram-connector-line"></div>
        <div class="diagram-connector-arrow">→</div>
      </div>

      <div class="diagram-node diagram-node--process">
        <div class="diagram-node-icon">⚙</div>
        <div class="diagram-node-label">Process</div>
        <div class="diagram-node-desc">Where it transforms</div>
      </div>

      <div class="diagram-connector" aria-hidden="true">
        <div class="diagram-connector-line"></div>
        <div class="diagram-connector-arrow">→</div>
      </div>

      <div class="diagram-node diagram-node--output">
        <div class="diagram-node-icon">◆</div>
        <div class="diagram-node-label">Output</div>
        <div class="diagram-node-desc">Where it delivers</div>
      </div>
    </div>

    <div class="diagram-details">
      <div class="diagram-detail">
        <div class="diagram-detail-title">Layer 1</div>
        <div class="diagram-detail-desc">Foundation layer description.</div>
      </div>
      <div class="diagram-detail">
        <div class="diagram-detail-title">Layer 2</div>
        <div class="diagram-detail-desc">Processing layer description.</div>
      </div>
      <div class="diagram-detail">
        <div class="diagram-detail-title">Layer 3</div>
        <div class="diagram-detail-desc">Output layer description.</div>
      </div>
    </div>
  </div>
</section>
