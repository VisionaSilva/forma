<!-- Block: video-embed | Video with supporting text -->
<section class="section video-embed-block">
<div class="video-embed-inner" data-animate="fade-up">
    <div class="video-embed-header">
      <div class="video-embed-eyebrow">Watch</div>
      <h2 class="video-embed-title">See it in action</h2>
      <p class="video-embed-subtitle">A quick walkthrough of how it works.</p>
    </div>

    <div class="video-container">
      <div class="video-wrapper">
        <div class="video-placeholder">
          <div class="video-play-button" aria-label="Play video">▶</div>
          <div class="video-duration">3:24</div>
        </div>
      </div>
      <div class="video-caption">Video description or transcript summary.</div>
    </div>
  </div>
</section>
